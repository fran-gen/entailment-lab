[workspace]
name = "entailment-lab"
version = "0.1.0"
description = "Entailment Lab development environment"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[tasks]
download-snli = "python utils/download_snli.py"
lab = "jupyter lab"

[dependencies]
python = ">=3.11,<3.13"
polars = ">=1.0.0"
pyarrow = ">=16.0.0"
requests = ">=2.31.0"
jupyterlab = ">=4.0.0"
ipykernel = ">=6.0.0"
matplotlib = ">=3.8.0"
seaborn = ">=0.13.0"
